---
name: yamllint check

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Identify changed YAML files
        id: changed
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46
        with:
          separator: "\n"
          files: |
            **/*.yml
            **/*.yaml

      - name: Install yamllint
        if: steps.changed.outputs.any_changed == 'true'
        run: pip install yamllint

      - name: Run yamllint
        if: steps.changed.outputs.any_changed == 'true'
        env:
          CHANGED_YAML_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          printf '%s\n' "$CHANGED_YAML_FILES" | sed 's/\\$//' > changed-yaml-files.txt
          mapfile -t files < changed-yaml-files.txt
          yamllint \
            -d '{extends: relaxed, rules: {line-length: {max: 120}}}' \
            "${files[@]}"

      - name: Skip yamllint, no YAML changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No YAML files modified"
